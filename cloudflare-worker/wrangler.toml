name            = "karthik-photos-worker"
main            = "worker.js"
compatibility_date = "2024-09-23"

# After deploying, your worker URL will be:
#   https://karthik-photos-worker.<your-subdomain>.workers.dev
#
# Set secrets (never commit these — run each command in this directory):
#   npx wrangler secret put GOOGLE_CLIENT_ID
#   npx wrangler secret put GOOGLE_CLIENT_SECRET
#   npx wrangler secret put GOOGLE_REFRESH_TOKEN
#   npx wrangler secret put ALBUM_ID
#
# Deploy:
#   npx wrangler deploy
#
# Then update WORKER_URL in _pages/photography.html with your worker's URL.
