<style>
  .photo-page {
    max-width: 1100px;
    margin: 2rem auto;
    padding: 0 1.5rem;
  }

  .photo-header {
    text-align: center;
    margin-bottom: 2.5rem;
  }

  .photo-header h1 {
    font-size: 2rem;
    font-weight: normal;
    margin: 0 0 0.5rem;
    color: #222;
  }

  .photo-header p {
    color: #666;
    font-size: 1rem;
    margin: 0;
  }

  /* ── Grid ── */
  .photo-grid {
    columns: 3;
    column-gap: 12px;
  }

  @media (max-width: 900px) { .photo-grid { columns: 2; } }
  @media (max-width: 560px) { .photo-grid { columns: 1; } }

  .photo-card {
    break-inside: avoid;
    margin-bottom: 12px;
    border-radius: 8px;
    overflow: hidden;
    cursor: pointer;
    position: relative;
    background: #e8e8e8;
  }

  .photo-card img {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 8px;
    transition: transform 0.3s ease, filter 0.3s ease;
    margin: 0;
  }

  .photo-card:hover img {
    transform: scale(1.03);
    filter: brightness(0.82);
  }

  /* ── Loading ── */
  .photo-loading {
    text-align: center;
    padding: 4rem 0;
    color: #888;
  }

  .loading-spinner {
    width: 36px;
    height: 36px;
    border: 3px solid #ddd;
    border-top-color: #07889b;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 1rem;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .photo-error {
    text-align: center;
    padding: 3rem 0;
    color: #c0392b;
  }

  /* ── Lightbox ── */
  .lightbox {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.93);
    z-index: 9999;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1.5rem;
    box-sizing: border-box;
  }

  .lightbox-inner {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    max-width: 90vw;
    max-height: 90vh;
  }

  .lightbox-inner img {
    max-width: 90vw;
    max-height: 82vh;
    object-fit: contain;
    border-radius: 6px;
    display: block;
    margin: 0;
  }

  .lightbox-close {
    position: fixed;
    top: 1rem;
    right: 1.25rem;
    background: none;
    border: none;
    color: #fff;
    font-size: 2rem;
    cursor: pointer;
    opacity: 0.7;
    transition: opacity 0.2s;
    z-index: 10001;
    line-height: 1;
  }
  .lightbox-close:hover { opacity: 1; }

  .lightbox-nav {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(255,255,255,0.12);
    border: none;
    color: #fff;
    font-size: 1.75rem;
    padding: 0.5rem 0.9rem;
    cursor: pointer;
    border-radius: 4px;
    transition: background 0.2s;
    z-index: 10001;
    line-height: 1;
  }
  .lightbox-nav:hover { background: rgba(255,255,255,0.25); }
  .lightbox-prev { left: 1rem; }
  .lightbox-next { right: 1rem; }

  .photo-sticky-quote {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(248, 248, 248, 0.92);
    backdrop-filter: blur(6px);
    text-align: center;
    padding: 0.6rem 1.5rem;
    color: #666;
    font-size: 0.95rem;
    border-bottom: 1px solid #e8e8e8;
    margin: 0 -1.5rem 1.5rem;
  }

  .lightbox-counter {
    position: fixed;
    bottom: 1rem;
    left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.5);
    font-size: 0.8rem;
  }
</style>

<div class="photo-page">
  <div class="photo-sticky-quote">
    <p>Every contrail is someone living the dream I once had, from wanting to fly them to chasing them across the sky through my lens.</p>
  </div>

  <div id="loading" class="photo-loading">
    <div class="loading-spinner"></div>
    <p>Loading photos&hellip;</p>
  </div>

  <div id="error" class="photo-error" style="display:none">
    <p>Could not load photos. Please try again later.</p>
  </div>

  <div id="gallery" class="photo-grid" style="display:none"></div>

  <div style="text-align:center; margin: 4rem 0 2rem; color:#888;">
    <em style="font-size:1.1rem;">Still looking up. ❤️</em>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" style="display:none" role="dialog" aria-modal="true">
  <button class="lightbox-close" onclick="closeLightbox()" aria-label="Close">&times;</button>
  <div class="lightbox-inner" onclick="event.stopPropagation()">
    <img id="lightbox-img" src="" alt="">
  </div>
  <button class="lightbox-nav lightbox-prev" onclick="shiftLightbox(-1)" aria-label="Previous">&#8592;</button>
  <button class="lightbox-nav lightbox-next" onclick="shiftLightbox(1)" aria-label="Next">&#8594;</button>
  <div id="lightbox-counter" class="lightbox-counter"></div>
</div>

<script>
  const FOLDER_ID = '__DRIVE_FOLDER_ID__';
  const API_KEY   = '__DRIVE_API_KEY__';

  let photos = [];
  let currentIndex = 0;

  function thumbUrl(id, size) {
    return `https://drive.google.com/thumbnail?id=${id}&sz=w${size}`;
  }

  async function loadPhotos() {
    try {
      let allFiles = [];
      let pageToken = '';

      do {
        const params = new URLSearchParams({
          q: `'${FOLDER_ID}' in parents and mimeType contains 'image/' and trashed = false`,
          fields: 'nextPageToken,files(id,name,createdTime)',
          orderBy: 'createdTime desc',
          pageSize: '100',
          key: API_KEY,
          ...(pageToken && { pageToken }),
        });

        const res = await fetch(`https://www.googleapis.com/drive/v3/files?${params}`);
        if (!res.ok) throw new Error(`Drive API error: ${res.status}`);
        const data = await res.json();

        if (data.error) throw new Error(data.error.message);
        allFiles = allFiles.concat(data.files || []);
        pageToken = data.nextPageToken || '';
      } while (pageToken);

      if (!allFiles.length) throw new Error('No images found in folder');

      // Fisher-Yates shuffle
      for (let i = allFiles.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [allFiles[i], allFiles[j]] = [allFiles[j], allFiles[i]];
      }

      photos = allFiles;
      renderGallery(photos);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('gallery').style.display = 'block';
    } catch (err) {
      console.error('Failed to load photos:', err);
      document.getElementById('loading').style.display = 'none';
      document.getElementById('error').style.display = 'block';
    }
  }

  function renderGallery(files) {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = '';
    files.forEach((file, i) => {
      const card = document.createElement('div');
      card.className = 'photo-card';
      card.setAttribute('role', 'button');
      card.setAttribute('tabindex', '0');

      const img = document.createElement('img');
      img.src = thumbUrl(file.id, 600);
      img.alt = file.name;
      img.loading = 'lazy';
      img.decoding = 'async';

      card.appendChild(img);
      card.addEventListener('click', () => openLightbox(i));
      card.addEventListener('keydown', e => { if (e.key === 'Enter') openLightbox(i); });
      gallery.appendChild(card);
    });
  }

  function openLightbox(index) {
    currentIndex = index;
    updateLightbox();
    document.getElementById('lightbox').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function updateLightbox() {
    const file = photos[currentIndex];
    document.getElementById('lightbox-img').src = thumbUrl(file.id, 2048);
    document.getElementById('lightbox-img').alt = file.name;
    document.getElementById('lightbox-counter').textContent =
      `${currentIndex + 1} / ${photos.length}`;
  }

  function closeLightbox() {
    document.getElementById('lightbox').style.display = 'none';
    document.body.style.overflow = '';
  }

  function shiftLightbox(dir) {
    currentIndex = (currentIndex + dir + photos.length) % photos.length;
    updateLightbox();
  }

  // Close on backdrop click
  document.getElementById('lightbox').addEventListener('click', function(e) {
    if (e.target === this) closeLightbox();
  });

  // Keyboard navigation
  document.addEventListener('keydown', e => {
    if (document.getElementById('lightbox').style.display === 'none') return;
    if (e.key === 'Escape')      closeLightbox();
    if (e.key === 'ArrowRight')  shiftLightbox(1);
    if (e.key === 'ArrowLeft')   shiftLightbox(-1);
  });

  loadPhotos();
</script>
